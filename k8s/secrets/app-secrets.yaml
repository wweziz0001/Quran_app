apiVersion: v1
kind: Secret
metadata:
  name: quran-secrets
  namespace: quran
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret-change-in-production"
  API_KEY: "your-api-key-change-in-production"
  Z_AI_API_KEY: "your-z-ai-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: quran
type: Opaque
stringData:
  DATABASE_URL: "file:/data/quran.db"
