apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quran-ingress
  namespace: quran
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.quran-app.com
    secretName: quran-tls
  rules:
  - host: api.quran-app.com
    http:
      paths:
      # Quran Service
      - path: /quran(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: quran-service
            port:
              number: 3001
      # Audio Service
      - path: /audio(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: audio-service
            port:
              number: 3002
      # Search Service
      - path: /search(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: search-service
            port:
              number: 3003
      # Tafsir Service
      - path: /tafsir(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: tafsir-service
            port:
              number: 3004
      # Users Service
      - path: /users(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: users-service
            port:
              number: 3005
      # Reciter Service
      - path: /reciter(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: reciter-service
            port:
              number: 3006
      # AI Service
      - path: /ai(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 3007
      # Admin Service
      - path: /admin(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 3008
