apiVersion: apps/v1
kind: Deployment
metadata:
  name: tafsir-service
  namespace: quran
  labels:
    app: tafsir-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tafsir-service
  template:
    metadata:
      labels:
        app: tafsir-service
    spec:
      containers:
      - name: tafsir-service
        image: quran/tafsir-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
          name: http
        envFrom:
        - configMapRef:
            name: quran-config
        - secretRef:
            name: quran-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: quran-data-pvc
