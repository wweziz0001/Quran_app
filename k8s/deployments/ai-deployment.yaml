apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: quran
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: quran/ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3007
          name: http
        envFrom:
        - configMapRef:
            name: quran-config
        - secretRef:
            name: quran-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: quran-data-pvc
