version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: quran-elasticsearch
    environment:
      - node.name=quran-es01
      - cluster.name=quran-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./synonyms.txt:/usr/share/elasticsearch/config/synonyms.txt:ro
      - ./stopwords_ar.txt:/usr/share/elasticsearch/config/stopwords_ar.txt:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quran-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: quran-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=quran-kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - quran-network

volumes:
  es_data:
    driver: local

networks:
  quran-network:
    name: quran-network
    driver: bridge
